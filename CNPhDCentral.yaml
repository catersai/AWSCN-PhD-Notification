AWSTemplateFormatVersion: '2010-09-09'
Description: 'Central EventBridge Bus for AWS Personal Health Dashboard Events'

Parameters:
  WebhookUrl:
    Type: String
    Description: 'Webhook URL for notifications (supports Feishu, DingTalk, Teams, WeCom, Slack)'
    NoEcho: true
  
  RequestsLayerArn:
    Type: String
    Description: 'ARN of Lambda Layer containing requests library (python3.14)'
  
  AllowedAccountIds:
    Type: String
    Description: 'Comma-separated list of AWS Account IDs (e.g., 123456789012,987654321098) allowed to put events (optional)'
    Default: ''
  
  AllowedOrganizationIds:
    Type: String
    Description: 'Comma-separated list of AWS Organization IDs (e.g., o-abc123,o-xyz789) allowed to put events (optional)'
    Default: ''

Conditions:
  HasAccountIds: !Not [!Equals [!Ref AllowedAccountIds, '']]
  HasOrgIds: !Not [!Equals [!Ref AllowedOrganizationIds, '']]

Resources:
  PhDEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PhDEventBus

  PhDEventBusPolicyLocal:
    Type: AWS::Events::EventBusPolicy
    Properties:
      EventBusName: !Ref PhDEventBus
      StatementId: AllowLocalAccountAllActions
      Statement:
        Effect: Allow
        Principal:
          AWS: !Sub 'arn:aws-cn:iam::${AWS::AccountId}:root'
        Action: 'events:*'
        Resource: !GetAtt PhDEventBus.Arn

  PhDEventBusPolicyAccounts:
    Type: AWS::Events::EventBusPolicy
    Condition: HasAccountIds
    Properties:
      EventBusName: !Ref PhDEventBus
      StatementId: AllowAccountsPutEvents
      Statement:
        Effect: Allow
        Principal:
          AWS: !Split [',', !Ref AllowedAccountIds]
        Action: 'events:PutEvents'
        Resource: !GetAtt PhDEventBus.Arn

  PhDEventBusPolicyOrgs:
    Type: AWS::Events::EventBusPolicy
    Condition: HasOrgIds
    Properties:
      EventBusName: !Ref PhDEventBus
      StatementId: AllowOrgsPutEvents
      Statement:
        Effect: Allow
        Principal: '*'
        Action: 'events:PutEvents'
        Resource: !GetAtt PhDEventBus.Arn
        Condition:
          StringEquals:
            'aws:PrincipalOrgID': !Split [',', !Ref AllowedOrganizationIds]

  PhDNotifyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws-cn:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  PhDNotifyLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PhDNotifyLambda
      Runtime: python3.14
      Handler: index.lambda_handler
      Role: !GetAtt PhDNotifyLambdaRole.Arn
      Timeout: 30
      Layers:
        - !Ref RequestsLayerArn
      Environment:
        Variables:
          WEBHOOK_URL: !Ref WebhookUrl
      Code:
        ZipFile: |
          import logging
          import requests
          import json
          import os

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          WEBHOOK_URL = os.environ.get('WEBHOOK_URL')

          def send_feishu(webhook_url, content):
              data = {"msg_type": "text", "content": {"text": content}}
              response = requests.post(webhook_url, headers={"Content-Type": "application/json"}, json=data, timeout=10)
              result = response.json()
              return result.get("code") == 0, result

          def send_dingtalk(webhook_url, content):
              data = {"msgtype": "text", "text": {"content": content.strip()}}
              response = requests.post(webhook_url, headers={"Content-Type": "application/json"}, json=data, timeout=10, verify=False)
              result = response.json()
              return result.get("errcode") == 0, result

          def send_teams(webhook_url, content):
              data = {"type": "message", "attachments": [{"contentType": "application/vnd.microsoft.card.adaptive", "content": {"type": "AdaptiveCard", "version": "1.5", "body": [{"type": "TextBlock", "text": content, "size": "Medium", "wrap": True}]}}]}
              response = requests.post(webhook_url, headers={"Content-Type": "application/json"}, json=data, timeout=10)
              return response.status_code in [200, 202], {"code": response.status_code}

          def send_wecom(webhook_url, content):
              data = {"msgtype": "markdown", "markdown": {"content": content}}
              response = requests.post(webhook_url, headers={"Content-Type": "application/json"}, json=data, timeout=10)
              result = response.json()
              return result.get("errcode") == 0, result

          def send_slack(webhook_url, content):
              data = {"text": content}
              response = requests.post(webhook_url, headers={"Content-Type": "application/json"}, json=data, timeout=10)
              return response.status_code == 200 and response.text == "ok", {"code": response.status_code, "msg": response.text}

          def send_notification(webhook_url, content):
              try:
                  if 'feishu.cn' in webhook_url or 'lark' in webhook_url:
                      success, result = send_feishu(webhook_url, content)
                      platform = "飞书"
                  elif 'dingtalk.com' in webhook_url:
                      success, result = send_dingtalk(webhook_url, content)
                      platform = "钉钉"
                  elif 'powerplatform.com' in webhook_url or 'webhook.office.com' in webhook_url:
                      success, result = send_teams(webhook_url, content)
                      platform = "Teams"
                  elif 'qyapi.weixin.qq.com' in webhook_url:
                      success, result = send_wecom(webhook_url, content)
                      platform = "企业微信"
                  elif 'hooks.slack.com' in webhook_url:
                      success, result = send_slack(webhook_url, content)
                      platform = "Slack"
                  else:
                      return False, {"error": "无法识别的Webhook URL"}
                  if success:
                      logger.info(f"{platform}消息发送成功")
                  else:
                      logger.error(f"{platform}消息发送失败：{result}")
                  return success, result
              except Exception as e:
                  logger.error(f"发送消息时发生错误：{str(e)}")
                  return False, {"error": str(e)}

          def lambda_handler(event, context):
              formatted_event = json.dumps(event, indent=2, ensure_ascii=False)
              message_content = f"""【AWS Health 事件通知】
          收到AWS Health Event事件，详细内容如下：
          {formatted_event}"""
              if not WEBHOOK_URL:
                  logger.error("未配置WEBHOOK_URL环境变量")
                  return {'statusCode': 500, 'body': json.dumps({"error": "未配置WEBHOOK_URL"})}
              success, result = send_notification(WEBHOOK_URL, message_content)
              logger.info(f"消息发送响应：{result}")
              return {'statusCode': 200 if success else 500, 'body': json.dumps({"message": "事件已处理", "send_result": result}, ensure_ascii=False)}

  PhDNotifyLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PhDNotifyLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PhDEventRule.Arn

  PhDEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: PhDEventRule
      EventBusName: !Ref PhDEventBus
      EventPattern:
        source:
          - aws.health
          - self.test.aws.health
      State: ENABLED
      Targets:
        - Arn: !GetAtt PhDNotifyLambda.Arn
          Id: PhDNotifyLambdaTarget

Outputs:
  PhDEventBusArn:
    Description: 'ARN of the PhDEventBus'
    Value: !GetAtt PhDEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-PhDEventBusArn'
  
  PhDEventBusName:
    Description: 'Name of the PhDEventBus'
    Value: !Ref PhDEventBus
    Export:
      Name: !Sub '${AWS::StackName}-PhDEventBusName'
  
  PhDNotifyLambdaArn:
    Description: 'ARN of the PhDNotifyLambda function'
    Value: !GetAtt PhDNotifyLambda.Arn
